<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/478a2fb00a.js" crossorigin="anonymous"></script>
    <script src="home.js" defer></script>
</head>
<body>
    <section>
        <nav>
            <div class="nav__row home__nav">
            <img src="assets/film.jpg" class="logo" alt="Tree Logo">
               <div class="nav__links">
                    <a href="#" class="nav__link nav__link--home">Home</a>
                    <a href="index.html" class="nav__link nav__link--home">What to watch</a>
                    <a href="#" class="nav__link nav__link--home">Contact</a>
                </div>
            </div>
        </nav>
    </section>
    <section id="landing" class="home">
        <div class="container">
            <div class="row">
                <div class="movie__header--home">
                    <h2 class="section__title--home">USA's most popular movie platform</h2>
                    <p class="section__para--home">Discover the latest movies and TV shows available for streaming.</p>
                    <form class="home__search__bar">
                        <input type="text" name="searchInput" class="searchInput home__search__input" placeholder="Search by movie titles...">
                        <div class="search__button__wrapper">
                            <button class="home__search__button" type="submit">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                            <div class="loading loading--open" >
                                <i class="fa-solid fa-spinner"></i>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="image__wrapper">
                    <img class="home__img" src="assets/movietime.jpg" alt="">
                </div>
            </div>
        </div>
    </section>
    
</body>
</html>
