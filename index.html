<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/478a2fb00a.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
     
<body>
    <section>
        <nav>
            <div class="nav__row">
            <img src="assets/tree.jpeg" class="logo" alt="Tree Logo">
               <div class="nav__links">
                    <a href="#" class="nav__link">Home</a>
                    <a href="#" class="nav__link">What to watch</a>
                    <a href="#" class="nav__link">Contact</a>
                </div>
            </div>
        </nav>
        </section>
        <header>
            <section id="landing">
            <div class="container">
                <div class="row">
                    <div class="movie__header">
                        <h2 class="section__title books__header--title">Browse Movies</h2>
                        <div class="search__bar">
                            <input type="text" class="search__input" placeholder="Search movies...">
                            <button class="search__button" >
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        </header>
        <section id="movies">
            <div class="container">
                <div class="row">
                    <div class="movies">
                        <div class="movie" >
                            <figure class="movie__wrapper">
                                <img src="assets/movie1.jpeg" class="movie__img" alt="Movie 1">
                            </figure>
                            <div class="movie__title"></div>

                        </div>
                    </div>
                </div>
            </div>
        </section>
    <footer>
        <div class="container">
            <div class="row">
                <div class="footer__content">
                    <a href="#" class="footer__logo">
                        <img src="assets/tree.jpeg" class="footer__img" alt="Tree Logo">
                    </a>
                    <div class="footer__links">
                        <a href="#" class="footer__link">Home</a>
                        <a href="#" class="footer__link">What to watch</a>
                        <a href="#" class="footer__link">Contact</a>
                    </div>
                    <p>&copy; 2026 All Rights Reserved.</p>
                </div>
            </div>
        </div>
</body>
<script src="style.js"></script>
</html>
